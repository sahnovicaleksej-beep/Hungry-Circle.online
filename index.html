<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HUNGRY CIRCLE</title>
<style>
  body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; touch-action: none; overscroll-behavior: none; }
  canvas { display: block; touch-action: none; }
  .hidden { display: none !important; }
  .screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(15, 15, 35, 0.85); z-index: 10; }
  .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 40px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); text-align: center; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.5); width: 320px; max-width: 90vw; position: relative; overflow: hidden; }
  .glass-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,94,120,0.1) 0%, transparent 70%); animation: rotate 20s linear infinite; }
  @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  h1 { margin: 0 0 10px; font-size: 2.5em; letter-spacing: 3px; background: linear-gradient(45deg, #ff5e78, #ff9a9e, #ff5e78); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradient 3s ease infinite, pulse-title 2s ease-in-out infinite; position: relative; z-index: 1; }
  @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  @keyframes pulse-title { 0%, 100% { transform: scale(1); text-shadow: 0 0 20px rgba(255,94,120,0.5); } 50% { transform: scale(1.02); text-shadow: 0 0 40px rgba(255,94,120,0.8); } }
  .subtitle { color: #888; margin-bottom: 30px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 2px; position: relative; z-index: 1; }
  .menu-stats { display: flex; justify-content: space-around; margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; position: relative; z-index: 1; }
  .menu-stat { text-align: center; }
  .menu-stat-value { font-size: 1.5em; font-weight: bold; color: #ff5e78; }
  .menu-stat-label { font-size: 0.7em; color: #666; text-transform: uppercase; }
  #ui { position: fixed; top: 20px; left: 20px; pointer-events: none; z-index: 5; }
  .stat { background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 10px; margin-bottom: 5px; font-weight: bold; border-left: 3px solid #ff5e78; }
  .levels-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
  .level-card { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: #34344d; border-radius: 8px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
  .level-card::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: 0.5s; }
  .level-card:hover:not(.locked)::after { left: 100%; }
  .level-card:hover:not(.locked) { background: #ff5e78; transform: scale(1.1); box-shadow: 0 0 15px rgba(255,94,120,0.5); }
  .level-card.locked { opacity: 0.3; cursor: not-allowed; }
  button { background: linear-gradient(135deg, #ff5e78, #e94560); border: none; padding: 12px 30px; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; font-size: 1.1em; position: relative; z-index: 1; box-shadow: 0 4px 15px rgba(255,94,120,0.3); }
  button:hover { background: linear-gradient(135deg, #ff7e90, #ff5e78); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,94,120,0.5); }
  button:active { transform: translateY(0); }
  .back-btn { background: transparent; border: 1px solid white; margin-top: 15px; box-shadow: none; }
  .back-btn:hover { background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
  .infinity-btn { display: none; /* скрыта по умолчанию, управляется кодом */ background: linear-gradient(135deg, #ffd700, #ffaa00); color: #1a1a2e; margin-top: 15px; }
  .infinity-btn:hover { background: linear-gradient(135deg, #ffec8b, #ffd700); box-shadow: 0 6px 20px rgba(255,215,0,0.5); }
  #tutorial { position: fixed; bottom: 100px; width: 100%; text-align: center; color: #ff5e78; font-weight: bold; animation: pulse 1.5s infinite; pointer-events: none; z-index: 5; text-shadow: 0 0 10px rgba(255,94,120,0.5); }
  @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
  .version { font-size: 11px; color: #555; margin-top: 15px; position: relative; z-index: 1; }
  .trophy-container { font-size: 80px; margin: 20px 0; animation: trophy-bounce 2s ease-in-out infinite; }
  @keyframes trophy-bounce { 0%, 100% { transform: scale(1) rotate(-5deg); } 50% { transform: scale(1.1) rotate(5deg); } }
  .completion-text { font-size: 1.3em; color: #ffd700; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
  .secret-arrow { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); font-size: 40px; cursor: pointer; z-index: 15; opacity: 0.3; transition: all 0.3s; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; }
  .secret-arrow.unlocked { opacity: 1; animation: arrow-pulse 1s ease-in-out infinite; }
  .secret-arrow.unlocked:hover { transform: translateY(-50%) scale(1.2); background: rgba(255,215,0,0.3); }
  @keyframes arrow-pulse { 0%, 100% { transform: translateY(-50%) translateX(0); } 50% { transform: translateY(-50%) translateX(10px); } }
  .infinity-badge { position: absolute; top: -10px; right: -10px; background: linear-gradient(135deg, #ffd700, #ffaa00); color: #1a1a2e; font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: bold; }
</style>
</head>
<body>
  <div id="ui" class="hidden">
    <div class="stat">Уровень: <span id="lvlVal">1</span></div>
    <div class="stat">Ягоды: <span id="scoreVal">0</span> / <span id="maxScoreVal">10</span></div>
    <div class="stat">HP: <span id="hpVal">5</span></div>
    <div class="stat" id="infinityStat" style="display:none">∞ Режим</div>
  </div>
  <div id="tutorial" class="hidden"></div>
  <div id="secretArrow" class="secret-arrow" onclick="showCompletion()">➤</div>

  <div id="mainMenu" class="screen">
    <div class="glass-card">
      <h1>HUNGRY CIRCLE</h1>
      <div class="subtitle">Survival Atmosphere</div>
      <div class="menu-stats">
        <div class="menu-stat">
          <div class="menu-stat-value">20</div>
          <div class="menu-stat-label">Уровней</div>
        </div>
        <div class="menu-stat">
          <div class="menu-stat-value" id="unlockedStat">1</div>
          <div class="menu-stat-label">Открыто</div>
        </div>
      </div>
      <button onclick="showLevels()">Играть</button>
      <div class="version">v 1.6 • Fixed Update ✦</div>
    </div>
  </div>

  <div id="levelMenu" class="screen hidden">
    <div class="glass-card">
      <h2>ВЫБЕРИТЕ УРОВЕНЬ</h2>
      <div class="levels-grid" id="levelContainer"></div>
      <button class="back-btn" onclick="showMain()">Назад</button>
      <button id="infinityBtn" class="infinity-btn hidden" onclick="startInfinityMode()">∞ Бесконечный режим</button>
    </div>
  </div>

  <div id="winMenu" class="screen hidden">
    <div class="glass-card">
      <h2 id="winStatus">УРОВЕНЬ ПРОЙДЕН!</h2>
      <button id="nextBtn" onclick="nextLevel()">Дальше</button>
      <button class="back-btn" onclick="showLevelsFromWin()">К уровням</button>
    </div>
  </div>

  <div id="completionMenu" class="screen hidden">
    <div class="glass-card">
      <div class="trophy-container">🏆</div>
      <div class="completion-text">Ты прошел основную линию игры!</div>
      <button class="back-btn" onclick="showMainFromCompletion()">Назад в меню</button>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');
    const tut = document.getElementById('tutorial');
    const secretArrow = document.getElementById('secretArrow');
    const infinityBtn = document.getElementById('infinityBtn');
    const isMobile = window.matchMedia('(pointer: coarse)').matches;
    const scale = isMobile ? 1.8 : 1;
    let gameState = 'menu';
    let currentLevel = 1;
    let unlockedLevels = 1;
    let score = 0;
    let hp = 5;
    let berries = [];
    let enemies = [];
    let freezers = [];
    let player = { x: 0, y: 0, r: 20 * scale };
    let mouse = { x: 0, y: 0 };
    let berriesToWin = 10;
    let isTouching = false;
    let isInfinityMode = false;
    let infinityScore = 0;
    let isFrozen = false;
    let frozenUntil = 0;
    let snowflakes = [];
    let hueRotation = 0;
    let lastHueChange = Date.now();
    let particles = [];
    let menuStars = [];

    // Загрузка спрайта главного персонажа из папки images
    // Файл: images/змея.png
    const playerSprite = new Image();
    // Путь к файлу внутри ZIP после распаковки
    playerSprite.src = './images/змея.png';
    let spriteReady = false;
    playerSprite.onload = () => { spriteReady = true; };

    // Размеры спрайта на экране (подберите под ваш спрайт)
    const SPRITE_W = 64;  // поменяйте под реальные размеры файла
    const SPRITE_H = 64;

    // Обновление формы игрока под спрайт
    function renderPlayer() {
      if (!spriteReady) {
        // запасной вариант: круг-подсветка
        ctx.fillStyle = '#ff5e78';
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
        ctx.fill();
        return;
      }

      // центрируем спрайт по координатам игрока
      const drawX = Math.floor(player.x - SPRITE_W / 2);
      const drawY = Math.floor(player.y - SPRITE_H / 2);
      ctx.drawImage(playerSprite, drawX, drawY, SPRITE_W, SPRITE_H);
    }

    // Остальной код игры (оставляем без изменений, но заменим отрисовку игрока на renderPlayer)
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function createMenuStars() {
      menuStars = [];
      for (let i = 0; i < 100; i++) {
        menuStars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2 + 0.5, speed: Math.random() * 0.5 + 0.1, brightness: Math.random(), twinkleSpeed: Math.random() * 0.02 + 0.01 });
      }
    }

    function drawMenuBackground() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      menuStars.forEach(star => {
        star.brightness += star.twinkleSpeed;
        const opacity = 0.3 + Math.sin(star.brightness) * 0.3;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
        ctx.fill();
        star.y += star.speed;
        if (star.y > canvas.height) { star.y = 0; star.x = Math.random() * canvas.width; }
      });
    }

    window.addEventListener('mousemove', (e) => {
      if (!isFrozen) { mouse.x = e.clientX; mouse.y = e.clientY; }
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      isTouching = true;
      if (!isFrozen) { const touch = e.touches[0]; mouse.x = touch.clientX; mouse.y = touch.clientY; }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!isFrozen) { const touch = e.touches[0]; mouse.x = touch.clientX; mouse.y = touch.clientY; }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => { e.preventDefault(); isTouching = false; }, { passive: false });
    document.body.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });

    function updateSecretArrow() {
      if (unlockedLevels >= 20) {
        secretArrow.classList.add('unlocked');
        secretArrow.style.cursor = 'pointer';
        secretArrow.innerHTML = '➤<span class="infinity-badge">∞</span>';
      } else {
        secretArrow.classList.remove('unlocked');
        secretArrow.style.cursor = 'default';
        secretArrow.innerHTML = '🔒';
      }
    }

    function showLevels() {
      document.getElementById('mainMenu').classList.add('hidden');
      document.getElementById('winMenu').classList.add('hidden');
      document.getElementById('completionMenu').classList.add('hidden');
      document.getElementById('levelMenu').classList.remove('hidden');
      const container = document.getElementById('levelContainer');
      container.innerHTML = '';
      document.getElementById('unlockedStat').innerText = unlockedLevels;
      if (infinityBtn) infinityBtn.style.display = 'none';
      for (let i = 1; i <= 20; i++) {
        const btn = document.createElement('div');
        btn.className = `level-card ${i > unlockedLevels ? 'locked' : ''}`;
        btn.innerText = i;
        btn.onclick = () => { if (i <= unlockedLevels) startGame(i); };
        container.appendChild(btn);
      }
    }

    function showMain() {
      document.getElementById('levelMenu').classList.add('hidden');
      document.getElementById('completionMenu').classList.add('hidden');
      document.getElementById('mainMenu').classList.remove('hidden');
      if (infinityBtn) infinityBtn.style.display = 'none';
      updateSecretArrow();
    }

    function showCompletion() {
      if (unlockedLevels < 20) return;
      document.getElementById('mainMenu').classList.add('hidden');
      document.getElementById('levelMenu').classList.add('hidden');
      document.getElementById('completionMenu').classList.remove('hidden');
    }

    function showMainFromCompletion() {
      document.getElementById('completionMenu').classList.add('hidden');
      document.getElementById('mainMenu').classList.remove('hidden');
    }

    function startInfinityMode() {
      isInfinityMode = true;
      infinityScore = 0;
      document.getElementById('levelMenu').classList.add('hidden');
      document.getElementById('completionMenu').classList.add('hidden');
      startGame(1);
    }

    function startGame(lvl) {
      currentLevel = lvl;
      score = 0;
      hp = 5;
      berriesToWin = isInfinityMode ? 999999 : 10 + (lvl * 2);
      gameState = 'playing';
      berries = [];
      enemies = [];
      freezers = [];
      snowflakes = [];
      particles = [];
      isFrozen = false;
      hueRotation = 0;
      lastHueChange = Date.now();
      ui.classList.remove('hidden');
      document.getElementById('levelMenu').classList.add('hidden');
      document.getElementById('winMenu').classList.add('hidden');
      if (!isInfinityMode) {
        if (lvl === 1) {
          tut.innerText = 'ДВИГАЙ ПАЛЬЦЕМ, ЧТОБЫ СОБИРАТЬ ЯГОДЫ И ИЗБЕГАТЬ КРАСНЫХ КВАДРАТОВ!';
          tut.classList.remove('hidden');
        } else if (lvl === 6) {
          tut.innerHTML = '⚠️ ВНИМАНИЕ! СИНИЕ КВАДРАТЫ ЗАМОРАЖИЮТ!<br>Не попадай в их голубое поле зрения!';
          tut.classList.remove('hidden');
        } else {
          tut.classList.add('hidden');
        }
      } else {
        tut.innerHTML = '∞ БЕСКОНЕЧНЫЙ РЕЖИМ<br>Собирай ягоды сколько сможешь!';
        tut.classList.remove('hidden');
      }
      player.x = canvas.width / 2;
      player.y = canvas.height / 2;
      mouse.x = canvas.width / 2;
      mouse.y = canvas.height / 2;
      updateUI();
      for(let i=0; i<8; i++) spawnBerry();
    }

    function spawnBerry() {
      berries.push({ x: Math.random() * (canvas.width-20) + 10, y: Math.random() * (canvas.height-20) + 10, r: 8 * scale, scale: 0, targetScale: 1 });
    }

    function spawnEnemy() {
      const size = 20 * scale;
      const speedMult = isMobile ? 0.65 : 0.9;
      const baseSpeed = isInfinityMode ? 2 : (2 + Math.random() * 2 + (currentLevel * 0.4));
      enemies.push({ x: Math.random() * (canvas.width - size), y: -size, size: size, speed: baseSpeed * speedMult });
    }

    function spawnFreezer() {
      if (isInfinityMode) return;
      const size = 20 * scale;
      const visionRadius = 80 * scale;
      freezers.push({ x: Math.random() * (canvas.width - size), y: -size - visionRadius, size: size, visionRadius: visionRadius, speed: 1.2 + Math.random() * 0.5, state: 'patrol', blinkStart: 0, freezeEnd: 0 });
    }

    function createParticles(x, y, color, count = 5) {
      for (let i = 0; i < count; i++) {
        particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4, life: 1, color: color, size: Math.random() * 3 + 1 });
      }
    }

    function updateUI() {
      if (isInfinityMode) {
        document.getElementById('lvlVal').innerText = '∞';
        document.getElementById('scoreVal').innerText = infinityScore;
        document.getElementById('maxScoreVal').innerText = '∞';
      } else {
        document.getElementById('lvlVal').innerText = currentLevel;
        document.getElementById('scoreVal').innerText = score;
        document.getElementById('maxScoreVal').innerText = berriesToWin;
      }
      document.getElementById('hpVal').innerText = hp;
    }

    function nextLevel() {
      if (isInfinityMode) { startGame(1); }
      else { startGame(currentLevel + 1); }
    }

    function showLevelsFromWin() {
      gameState = 'menu';
      isInfinityMode = false;
      document.getElementById('infinityStat').style.display = 'none';
      ui.classList.add('hidden');
      showLevels();
    }

    function victory() {
      if (isInfinityMode) return;
      gameState = 'win';
      if (currentLevel === unlockedLevels) unlockedLevels++;
      document.getElementById('winStatus').innerText = "УРОВЕНЬ ПРОЙДЕН!";
      document.getElementById('nextBtn').classList.remove('hidden');
      document.getElementById('winMenu').classList.remove('hidden');
      updateSecretArrow();
    }

    function gameOver() {
      gameState = 'win';
      if (isInfinityMode) {
        document.getElementById('winStatus').innerHTML = `∞ ИГРА ОКОНЧЕНА<br><small>Счёт: ${infinityScore}</small>`;
        document.getElementById('nextBtn').innerText = 'Заново';
        document.getElementById('nextBtn').classList.remove('hidden');
      } else {
        document.getElementById('winStatus').innerText = "ИГРА ОКОНЧЕНА";
        document.getElementById('nextBtn').classList.add('hidden');
      }
      document.getElementById('winMenu').classList.remove('hidden');
    }

    function createSnowflakes() {
      for (let i = 0; i < 50; i++) {
        snowflakes.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 3 + 1, speed: Math.random() * 2 + 1, drift: Math.random() * 1 - 0.5 });
      }
    }

    function drawSnow() {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
      snowflakes.forEach(flake => {
        ctx.beginPath();
        ctx.arc(flake.x, flake.y, flake.size, 0, Math.PI * 2);
        ctx.fill();
        flake.y += flake.speed;
        flake.x += flake.drift;
        if (flake.y > canvas.height) { flake.y = -5; flake.x = Math.random() * canvas.width; }
      });
    }

    function animate() {
      if (gameState === 'menu') {
        drawMenuBackground();
        requestAnimationFrame(animate);
        return;
      }

      const now = Date.now();
      if (now - lastHueChange > 30000) { hueRotation = (hueRotation + 30) % 360; lastHueChange = now; }

      ctx.filter = `hue-rotate(${hueRotation}deg)`;
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.filter = 'none';

      if (gameState === 'playing') {
        if (isFrozen && now > frozenUntil) { isFrozen = false; snowflakes = []; }
        if (!isFrozen) { player.x += (mouse.x - player.x) * 0.15; player.y += (mouse.y - player.y) * 0.15; }

        // фоновые эффекты и ягоды
        const gradient = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.r * 2);
        gradient.addColorStop(0, isFrozen ? 'rgba(135,206,235,0.5)' : 'rgba(255,94,120,0.5)');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
        ctx.fillStyle = isFrozen ? '#87CEEB' : '#ff5e78';
        ctx.fill();
        ctx.closePath();

        if (isFrozen) {
          ctx.strokeStyle = '#00BFFF';
          ctx.lineWidth = 3;
          ctx.stroke();
        }

        berries.forEach((b, i) => {
          if (b.scale < b.targetScale) { b.scale += 0.1; }
          ctx.save();
          ctx.translate(b.x, b.y);
          ctx.scale(b.scale, b.scale);
          const berryGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, b.r * 2);
          berryGlow.addColorStop(0, 'rgba(78,204,163,0.6)');
          berryGlow.addColorStop(1, 'transparent');
          ctx.fillStyle = berryGlow;
          ctx.beginPath();
          ctx.arc(0, 0, b.r * 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(0, 0, b.r, 0, Math.PI * 2);
          ctx.fillStyle = '#4ecca3';
          ctx.fill();
          ctx.closePath();
          ctx.restore();

          let dist = Math.hypot(player.x - b.x, player.y - b.y);
          if (dist < player.r + b.r && !isFrozen) {
            createParticles(b.x, b.y, '#4ecca3', 8);
            berries.splice(i, 1);
            score++;
            if (isInfinityMode) infinityScore++;
            updateUI();
            spawnBerry();
            if (!isInfinityMode && score >= berriesToWin) {
              victory();
            }
          }
        });

        const spawnRate = isInfinityMode ? 0.015 : (0.02 + (currentLevel * 0.005));
        if (Math.random() < spawnRate) spawnEnemy();

        enemies.forEach((e, i) => {
          e.y += e.speed;
          ctx.fillStyle = 'rgba(0,0,0,0.3)';
          ctx.fillRect(e.x + 3, e.y + 3, e.size, e.size);
          ctx.fillStyle = '#e94560';
          ctx.fillRect(e.x, e.y, e.size, e.size);
          if (e.y > canvas.height) enemies.splice(i, 1);

          if (!isFrozen && player.x + player.r > e.x && player.x - player.r < e.x + e.size && player.y + player.r > e.y && player.y - player.r < e.y + e.size) {
            createParticles(player.x, player.y, '#ff0000', 10);
            enemies.splice(i, 1);
            hp--;
            updateUI();
            if (hp <= 0) gameOver();
          }
        });

        if (!isInfinityMode && currentLevel >= 6 && Math.random() < 0.006) spawnFreezer();

        freezers.forEach((f, i) => {
          const now = Date.now();
          if (f.state !== 'freezing') { f.y += f.speed; }
          const isBlinking = f.state === 'detected' && now < f.blinkStart + 2000;
          const visionOpacity = isBlinking ? (Math.floor(now / 200) % 2 === 0 ? 0.6 : 0.1) : 0.25;
          ctx.beginPath();
          ctx.arc(f.x + f.size/2, f.y + f.size/2, f.visionRadius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0, 191, 255, ${visionOpacity})`;
          ctx.fill();
          ctx.closePath();

          ctx.fillStyle = isBlinking ? (Math.floor(now / 200) % 2 === 0 ? '#00FFFF' : '#0080FF') : '#4169E1';
          ctx.fillRect(f.x, f.y, f.size, f.size);

          ctx.strokeStyle = 'rgba(255,255,255,0.3)';
          ctx.lineWidth = 1;
          ctx.strokeRect(f.x, f.y, f.size, f.size);

          if (!isFrozen && f.state === 'patrol') {
            const distToPlayer = Math.hypot(player.x - (f.x + f.size/2), player.y - (f.y + f.size/2));
            if (distToPlayer < f.visionRadius + player.r) {
              f.state = 'detected';
              f.blinkStart = now;
            }
          }

          if (f.state === 'detected' && now >= f.blinkStart + 2000) {
            f.state = 'freezing';
            isFrozen = true;
            frozenUntil = now + 3000;
            createSnowflakes();
            freezers.splice(i, 1);
          }

          if (f.y > canvas.height + f.visionRadius) { freezers.splice(i, 1); }
        });

        particles.forEach((p, i) => {
          p.x += p.vx;
          p.y += p.vy;
          p.life -= 0.02;
          p.size *= 0.98;
          if (p.life <= 0) { particles.splice(i, 1); } else {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }
        });

        if (isFrozen) {
          drawSnow();
          const remaining = Math.ceil((frozenUntil - Date.now()) / 1000);
          ctx.fillStyle = 'white';
          ctx.font = 'bold 40px Segoe UI';
          ctx.textAlign = 'center';
          ctx.shadowColor = '#00BFFF';
          ctx.shadowBlur = 20;
          ctx.fillText(`❄️ ЗАМОРОЖЕН! ${remaining}`, canvas.width/2, canvas.height/2);
          ctx.shadowBlur = 0;
        }

        // Рисуем игрока спрайтом, если он готов
        renderPlayer();
      }

      requestAnimationFrame(animate);
    }

    createMenuStars();
    updateSecretArrow();
    animate();
  </script>
</body>
</html>
